<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0041a3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- ✅ /pwa/ safe -->
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">

<title>Luconi Vouchers</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}
input,select,textarea,button{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#0052cc!important;box-shadow:0 0 0 3px rgba(0,82,204,.15)}
button{cursor:pointer;transition:transform .1s}
button:active{transform:scale(.97)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{animation:slideUp .35s ease-out}

.inp{width:100%;padding:14px 16px;background:#f0f4f8;border:2px solid #dce3eb;border-radius:12px;color:#1a1a2e;font-size:15px}
.lbl{display:block;font-size:12px;font-weight:600;color:#5a6a7a;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.btn{border:none;border-radius:10px;padding:12px 20px;font-weight:600;font-size:14px;color:#fff}
.btn-primary{background:#0052cc}.btn-green{background:#27ae60}.btn-red{background:#e74c3c}.btn-ghost{background:#f0f4f8;color:#333}
.btn-full{width:100%}
.panel{background:#fff;border-radius:18px;padding:24px;margin-bottom:16px;border:1px solid #e2e8f0}

#login-page{min-height:100vh;background:linear-gradient(135deg,#0041a3,#0052cc);display:flex;align-items:center;justify-content:center}
#login-box{background:#fff;border-radius:24px;padding:40px;width:90%;max-width:380px;box-shadow:0 30px 80px rgba(0,0,0,.3)}

.app-header{background:linear-gradient(135deg,#0041a3,#0052cc);padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.app-header h1{font-size:18px;color:#fff;font-weight:700}
.app-header .sub{font-size:10px;color:rgba(255,255,255,.6)}
.app-header .btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:1px solid #e2e8f0;padding:6px 4px 12px;display:flex;justify-content:center;gap:1px;z-index:100}
.nav-btn{background:transparent;border:1px solid transparent;border-radius:12px;padding:6px 9px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{background:#eef6ff;border-color:#b3d4fc}
.nav-btn .icon{font-size:16px}.nav-btn .txt{font-size:8px;font-weight:600;color:#999}
.nav-btn.active .txt{color:#0052cc}

.content{max-width:600px;margin:0 auto;padding:20px 16px 100px}

.stats-hero{background:linear-gradient(135deg,#0052cc,#2684ff);border-radius:20px;padding:28px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.stat-card{background:rgba(255,255,255,.15);border-radius:14px;padding:14px 10px;text-align:center}
.stat-card .num{font-size:26px;font-weight:700;color:#fff;margin-top:4px}
.stat-card .lab{font-size:11px;color:rgba(255,255,255,.75)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:1100;padding:14px 28px;border-radius:14px;font-weight:600;font-size:14px;color:#fff;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.toast-success{background:#27ae60}.toast-error{background:#e74c3c}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1050;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:20px;padding:28px;max-width:380px;width:100%}

.ticket-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.ticket-box{background:#fff;border-radius:20px;padding:28px;max-width:380px;width:100%}
.ticket-caja{text-align:center;background:#0041a3;color:#fff;border-radius:14px;padding:16px 20px;margin:16px 0;font-size:28px;font-weight:700}

.sig-wrap{background:#fff;border-radius:16px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.sig-canvas{width:100%;height:150px;border:2px dashed #ccc;border-radius:10px;cursor:crosshair;touch-action:none;background:#fafafa}

.info-box{background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;padding:12px;font-size:12px;color:#1e40af;margin-bottom:14px}
.warn-box{background:#fffbeb;border:1px solid #fbbf24;border-radius:10px;padding:12px;font-size:12px;color:#92400e;line-height:1.5;margin-bottom:14px}
.danger-zone{margin-top:30px;padding:20px;background:#fef2f2;border-radius:14px;border:2px solid #ef4444}

.emp-row{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e2e8f0}
.tx-row{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:6px;border:1px solid #e2e8f0}

.sum-card{background:#eef6ff;border-radius:14px;padding:18px;margin-bottom:12px}
.sum-grid{display:grid;gap:10px}

.bono-item{display:flex;justify-content:space-between;background:#f8f9fa;border-radius:8px;padding:8px 12px;margin-bottom:4px}
.bono-check{display:flex;align-items:center;gap:10px;border-radius:10px;padding:10px 14px;margin-bottom:6px;cursor:pointer;border:2px solid #e2e8f0;background:#f8f9fa}
.bono-check.selected{border-color:#27ae60;background:#d4edda}

.caja-btn{flex:1;font-size:18px;padding:16px;border:none;border-radius:10px;font-weight:600;cursor:pointer}

.preforma-hero{background:linear-gradient(135deg,#0052cc,#2684ff);border-radius:18px;padding:24px;margin-bottom:20px}

.sync-badge{font-size:10px;padding:3px 8px;border-radius:8px;font-weight:600;margin-left:8px}
.sync-online{background:rgba(39,174,96,.2);color:#27ae60}
.sync-offline{background:rgba(231,76,60,.2);color:#e74c3c}
.sync-syncing{background:rgba(241,196,15,.2);color:#f1c40f}
</style>
</head>

<body>
<div id="app"></div>
<script>
// Archivo pegado por solicitud del usuario.
</script>
</body>
</html>
