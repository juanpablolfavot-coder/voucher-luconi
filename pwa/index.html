<script>
/* =========================
   ✅ SW (una sola vez)
   ========================= */
var ENABLE_SW = true; // ponelo en false si querés probar sin SW
if (ENABLE_SW && 'serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(e){ console.log('sw err', e); });
}

/* =========================
   ✅ Supabase (opcional)
   - Si NO configurás, funciona LOCAL
   ========================= */
var SUPABASE_URL = 'TU_URL_AQUI';
var SUPABASE_KEY = 'TU_KEY_AQUI';

var DB = {
  online: navigator.onLine,
  syncing: false,
  configured: function() { return SUPABASE_URL !== 'TU_URL_AQUI' && SUPABASE_KEY !== 'TU_KEY_AQUI'; },

  _fetch: function(table, method, body, query) {
    if (!this.configured() || !this.online) return Promise.reject('offline');
    var url = SUPABASE_URL + '/rest/v1/' + table + (query || '');
    var opts = {
      method: method || 'GET',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': method === 'POST' ? 'return=representation' : (method === 'PATCH' ? 'return=representation' : '')
      }
    };
    if (body) opts.body = JSON.stringify(body);
    return fetch(url, opts).then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
      var ct = r.headers.get('content-type');
      if (ct && ct.indexOf('json') >= 0) return r.json();
      return null;
    });
  },

  select: function(table, query) { return this._fetch(table, 'GET', null, '?select=*' + (query || '') + '&order=created_at.asc.nullsfirst'); },
  selectTx: function(query) { return this._fetch('transactions', 'GET', null, '?select=*' + (query || '') + '&order=date.desc'); },
  update: function(table, id, data) { return this._fetch(table, 'PATCH', data, '?id=eq.' + id); },
  upsert: function(table, data) {
    return this._fetch(table, 'POST', Array.isArray(data) ? data : [data], '?on_conflict=id').catch(function() {
      return DB._fetch(table, 'POST', Array.isArray(data) ? data : [data]);
    });
  },
  del: function(table, id) { return this._fetch(table, 'DELETE', null, '?id=eq.' + id); },
  delWhere: function(table, col, val) { return this._fetch(table, 'DELETE', null, '?' + col + '=eq.' + val); }
};

window.addEventListener('online', function() { DB.online = true; syncToCloud(); renderSyncBadge(); });
window.addEventListener('offline', function() { DB.online = false; renderSyncBadge(); });

/* =========================
   Local storage
   ========================= */
var LS = {
  get: function(k) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
  set: function(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
};

/* =========================
   Estado
   ========================= */
var DEFAULT_USERS = [
  { id:"dev1", username:"developer", password:"dev2024", name:"Desarrollador", role:"dev" },
  { id:"admin1", username:"admin", password:"admin123", name:"Administradora", role:"admin" },
  { id:"recep1", username:"recepcion", password:"recep123", name:"Recepcionista", role:"recepcion" }
];
var ROLE_LABELS = { dev:"🔧 Desarrollador", admin:"🔑 Administradora", recepcion:"🛒 Recepción" };

var S = {
  users: LS.get("luc6-users") || DEFAULT_USERS,
  companies: LS.get("luc6-co") || [],
  employees: LS.get("luc6-emp") || [],
  bonos: LS.get("luc6-bonos") || [],
  transactions: LS.get("luc6-tx") || [],
  currentUser: null,
  view: "home",
  found: null,
  selectedBonos: [],
  selectedCaja: "1",
  lastTicket: null,
  rMonth: curMonth(),
  rCo: "all",
  pendingSync: LS.get("luc6-pending") || []
};

function saveLocal() {
  LS.set("luc6-users", S.users);
  LS.set("luc6-co", S.companies);
  LS.set("luc6-emp", S.employees);
  LS.set("luc6-bonos", S.bonos);
  LS.set("luc6-tx", S.transactions);
  LS.set("luc6-pending", S.pendingSync);
}

/* =========================
   Sync engine (opcional)
   ========================= */
function addPending(action, table, data, id) {
  S.pendingSync.push({ action:action, table:table, data:data, id:id, ts:Date.now() });
  saveLocal();
}
function syncToCloud() {
  if (!DB.configured() || !DB.online || DB.syncing) return;
  if (S.pendingSync.length === 0) { pullFromCloud(); return; }

  DB.syncing = true;
  renderSyncBadge();

  var pending = S.pendingSync.slice();
  var i = 0;

  function next() {
    if (i >= pending.length) {
      S.pendingSync = S.pendingSync.filter(function(p) { return pending.indexOf(p) < 0; });
      saveLocal();
      DB.syncing = false;
      renderSyncBadge();
      pullFromCloud();
      return;
    }
    var p = pending[i]; i++;
    var promise;
    if (p.action === 'upsert') promise = DB.upsert(p.table, p.data);
    else if (p.action === 'update') promise = DB.update(p.table, p.id, p.data);
    else if (p.action === 'delete') promise = DB.del(p.table, p.id);
    else if (p.action === 'deleteWhere') promise = DB.delWhere(p.table, p.data.col, p.data.val);
    else promise = Promise.resolve();

    promise.then(next).catch(function() {
      DB.syncing = false;
      renderSyncBadge();
    });
  }
  next();
}
function pullFromCloud() {
  if (!DB.configured() || !DB.online) return;
  Promise.all([
    DB.select('users'),
    DB.select('companies'),
    DB.select('employees'),
    DB.select('bonos'),
    DB.selectTx()
  ]).then(function(results) {
    var cloudUsers = (results[0]||[]).map(mapUser);
    var cloudCo = (results[1]||[]).map(mapCompany);
    var cloudEmp = (results[2]||[]).map(mapEmployee);
    var cloudBonos = (results[3]||[]).map(mapBono);
    var cloudTx = (results[4]||[]).map(mapTransaction);

    if (cloudUsers.length > 0) S.users = cloudUsers;
    if (cloudCo.length > 0 || S.companies.length === 0) S.companies = cloudCo;
    S.employees = cloudEmp;
    S.bonos = cloudBonos;
    if (cloudTx.length > 0 || S.transactions.length === 0) S.transactions = cloudTx;

    saveLocal();
    render();
  }).catch(function(){});
}

function mapUser(r) { return { id:r.id, username:r.username, password:r.password, name:r.name, role:r.role }; }
function mapCompany(r) { return { id:r.id, name:r.name }; }
function mapEmployee(r) { return { id:r.id, name:r.name, dni:r.dni, companyId:r.company_id }; }
function mapBono(r) { return { id:r.id, employeeId:r.employee_id, companyId:r.company_id, amount:Number(r.amount), remainingBalance:Number(r.remaining_balance), label:r.label, date:r.date }; }
function mapTransaction(r) { return { id:r.id, employeeId:r.employee_id, employeeName:r.employee_name, employeeDni:r.employee_dni, companyId:r.company_id, amount:Number(r.amount), date:r.date, signature:r.signature, bonosUsed:r.bonos_used||[], caja:r.caja, registeredBy:r.registered_by }; }

function toCloudCompany(c) { return { id:c.id, name:c.name }; }
function toCloudEmployee(e) { return { id:e.id, name:e.name, dni:e.dni, company_id:e.companyId }; }
function toCloudBono(b) { return { id:b.id, employee_id:b.employeeId, company_id:b.companyId, amount:b.amount, remaining_balance:b.remainingBalance, label:b.label, date:b.date }; }
function toCloudTx(t) { return { id:t.id, employee_id:t.employeeId, employee_name:t.employeeName, employee_dni:t.employeeDni, company_id:t.companyId, amount:t.amount, date:t.date, signature:t.signature, bonos_used:t.bonosUsed||[], caja:t.caja, registered_by:t.registeredBy }; }

/* =========================
   Utils
   ========================= */
function gid(){return Math.random().toString(36).slice(2,10);}
function fmtC(n){return "$"+Number(n).toLocaleString("es-AR",{minimumFractionDigits:2});}
function fmtD(d){return new Date(d).toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function fmtDS(d){return new Date(d).toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function todayStr(){return new Date().toISOString().slice(0,10);}
function curMonth(){return new Date().toISOString().slice(0,7);}
function monthLabel(m){var p=m.split("-");var ms=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];return ms[parseInt(p[1])-1]+" "+p[0];}
function $(sel){return document.querySelector(sel);}

function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)for(var k in attrs){
    if(k==="style"&&typeof attrs[k]==="object")Object.assign(el.style,attrs[k]);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(k==="className")el.className=attrs[k];
    else if(k==="innerHTML")el.innerHTML=attrs[k];
    else el.setAttribute(k,attrs[k]);
  }
  if(children!=null){
    if(Array.isArray(children))children.forEach(function(c){if(c!=null)el.appendChild(typeof c==="string"?document.createTextNode(c):c);});
    else if(typeof children==="string")el.textContent=children;
    else el.appendChild(children);
  }
  return el;
}

var toastTimer=null;
function showToast(msg,type){
  var old=$(".toast"); if(old)old.remove();
  var t=h("div",{className:"toast toast-"+(type||"success")},msg);
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.remove();},3000);
}

function showModal(title,msg,onConfirm){
  var ov=h("div",{className:"modal-overlay"});
  ov.appendChild(h("div",{className:"modal-box"},[
    h("h3",{style:{fontSize:"18px",marginBottom:"10px"}},title),
    h("p",{style:{color:"#666",fontSize:"14px",marginBottom:"20px"}},msg),
    h("div",{style:{display:"flex",gap:"10px"}},[
      h("button",{className:"btn btn-ghost",style:{flex:"1"},onClick:function(){ov.remove();}},"Cancelar"),
      h("button",{className:"btn btn-red",style:{flex:"1"},onClick:function(){ov.remove();onConfirm();}},"Confirmar")
    ])
  ]));
  document.body.appendChild(ov);
}

function getEB(eid){return S.bonos.filter(function(b){return b.employeeId===eid&&b.remainingBalance>0;});}
function getTB(eid){return getEB(eid).reduce(function(s,b){return s+b.remainingBalance;},0);}

function renderSyncBadge() {
  var el = $("#sync-badge");
  if (!el) return;
  if (!DB.configured()) { el.textContent = "⚠️ Sin config"; el.className = "sync-badge sync-offline"; }
  else if (DB.syncing) { el.textContent = "🔄 Sincronizando..."; el.className = "sync-badge sync-syncing"; }
  else if (DB.online) { el.textContent = "🟢 Online"; el.className = "sync-badge sync-online"; }
  else { el.textContent = "🔴 Offline"; el.className = "sync-badge sync-offline"; }
}

/* =========================
   Render principal
   ========================= */
function render(){
  var app=$("#app");
  app.innerHTML="";
  if(!S.currentUser){ renderLogin(app); return; }
  renderApp(app);
}

function renderLogin(app){
  var page=h("div",{id:"login-page"});
  var box=h("div",{id:"login-box"});
  box.innerHTML = ''
    + '<div style="text-align:center;margin-bottom:30px">'
    + '  <div style="font-size:40px;margin-bottom:8px">🛒</div>'
    + '  <h1 style="font-size:24px;color:#0041a3;font-weight:700">Luconi</h1>'
    + '  <p style="font-size:13px;color:#888;margin-top:4px">Sistema de Vouchers</p>'
    + '</div>';

  var errP=h("p",{style:{color:"#e74c3c",fontSize:"13px",textAlign:"center",marginBottom:"10px",display:"none"}});
  var userInp=h("input",{className:"inp",placeholder:"usuario",style:{marginBottom:"12px"}});
  var passInp=h("input",{className:"inp",type:"password",placeholder:"••••••",style:{marginBottom:"6px"}});

  function doLogin(){
    var u=S.users.find(function(x){return x.username===userInp.value && x.password===passInp.value;});
    if(!u){ errP.textContent="Usuario o contraseña incorrectos"; errP.style.display="block"; return; }
    S.currentUser=u; S.view="home"; render(); syncToCloud();
  }
  userInp.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
  passInp.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});

  box.appendChild(h("label",{className:"lbl"},"Usuario")); box.appendChild(userInp);
  box.appendChild(h("label",{className:"lbl"},"Contraseña")); box.appendChild(passInp);
  box.appendChild(errP);
  box.appendChild(h("button",{className:"btn btn-primary btn-full",style:{padding:"16px",fontSize:"16px",marginTop:"10px"},onClick:doLogin},"Ingresar"));

  page.appendChild(box);
  app.appendChild(page);
}

function renderApp(app){
  var isDev=S.currentUser.role==="dev";
  var isAdmin=S.currentUser.role==="admin"||isDev;

  var headerLeft=h("div",null,[
    h("h1",null,"Luconi — Vouchers"),
    h("p",{className:"sub"},[
      document.createTextNode(S.currentUser.name+" ("+ROLE_LABELS[S.currentUser.role]+") "),
      h("span",{id:"sync-badge",className:"sync-badge"})
    ])
  ]);

  app.appendChild(h("div",{className:"app-header"},[
    headerLeft,
    h("button",{className:"btn-logout",onClick:function(){S.currentUser=null;S.view="home";render();}},"Salir")
  ]));

  var content=h("div",{className:"content"});
  app.appendChild(content);

  if(S.view==="home") renderHome(content);
  else if(S.view==="register") renderRegister(content);
  else if(S.view==="bonos" && isAdmin) renderBonos(content);
  else if(S.view==="companies" && isAdmin) renderCompanies(content);
  else if(S.view==="employees" && isAdmin) renderEmployees(content);
  else if(S.view==="reports" && isAdmin) renderReports(content);
  else if(S.view==="settings" && isAdmin) renderSettings(content,isDev);

  var navItems = isAdmin
    ? [{k:"home",i:"🏠",l:"Inicio"},{k:"register",i:"🛒",l:"Registrar"},{k:"bonos",i:"🎁",l:"Bonos"},{k:"companies",i:"🏢",l:"Empresas"},{k:"employees",i:"👥",l:"Personal"},{k:"reports",i:"📊",l:"Reportes"},{k:"settings",i:"⚙️",l:"Config"}]
    : [{k:"home",i:"🏠",l:"Inicio"},{k:"register",i:"🛒",l:"Registrar"}];

  var nav=h("div",{className:"bottom-nav"});
  navItems.forEach(function(n){
    nav.appendChild(h("button",{
      className:"nav-btn"+(S.view===n.k?" active":""),
      onClick:function(){S.view=n.k;S.found=null;S.selectedBonos=[];S._purchaseAmt="";S._showSig=false;render();}
    },[
      h("span",{className:"icon"},n.i),
      h("span",{className:"txt"},n.l)
    ]));
  });

  app.appendChild(nav);
  renderSyncBadge();
}

/* =========================

      ]));

          className:"bono-check"+(sel?" selected":""),
          onClick:function(){
            var idx=S.selectedBonos.indexOf(b.id);

          h("input",{type:"checkbox",checked:sel?"checked":null,style:{width:"18px",height:"18px",accentColor:"#27ae60",pointerEvents:"none"}}),

          ]),

      if(eb.length>0){
        panel.appendChild(h("label",{className:"lbl"},"Monto"));
        var amtInp=h("input",{type:"number",className:"inp",placeholder:"0.00",style:{marginBottom:"16px",fontSize:"20px",fontWeight:"700",textAlign:"center"},value:S._purchaseAmt||""});

      panel.appendChild(h("div",{style:{display:"flex",gap:"10px",marginBottom:"18px"}},[

function regPurchase(sig){
  var emp=S.found;
  var amount=S._purchaseAmt ? parseFloat(S._purchaseAmt) : 0;
  var eb=getEB(emp.id);
  var bu=[];

  if(eb.length>0 && amount>0){
    var ub = S.selectedBonos.length>0 ? eb.filter(function(b){return S.selectedBonos.indexOf(b.id)>=0;}) : eb;
    var av = ub.reduce(function(s,b){return s+b.remainingBalance;},0);
    if(amount>av){ showToast("Saldo insuficiente: "+fmtC(av),"error"); return; }

    var rem=amount;
    for(var i=0;i<ub.length;i++){
      if(rem<=0) break;
      var x=ub[i];
      var idx=S.bonos.findIndex(function(b){return b.id===x.id;});
      var dd=Math.min(rem, x.remainingBalance);
      S.bonos[idx] = Object.assign({}, S.bonos[idx], { remainingBalance: S.bonos[idx].remainingBalance - dd });
      bu.push({ bonoId:x.id, amount:dd, label:x.label });
      rem -= dd;

      addPending('update','bonos',{remaining_balance:S.bonos[idx].remainingBalance},x.id);
    }
  }

  var tx={
    id:gid(),
    employeeId:emp.id,
    employeeName:emp.name,
    employeeDni:emp.dni,
    companyId:emp.companyId,
    amount: amount,
    date: new Date().toISOString(),
    signature: sig,
    bonosUsed: bu,
    caja: S.selectedCaja,
    registeredBy: S.currentUser ? S.currentUser.name : "?"
  };

  S.transactions.push(tx);
  addPending('upsert','transactions',toCloudTx(tx));
  saveLocal();

  S.lastTicket={tx:tx,company:(S.companies.find(function(c){return c.id===emp.companyId;})||{}).name||"?",caja:S.selectedCaja};

  S.found=null;
  S._purchaseAmt="";
  S._showSig=false;
  S._lastDni="";
  S.selectedBonos=[];

  showToast("Visita registrada ✓");
  render();
  showTicketModal();
  syncToCloud();
}

function renderSigPad(parent,onSave,onCancel){
  var wrap=h("div",{className:"sig-wrap"});
  wrap.appendChild(h("p",{style:{margin:"0 0 10px",fontSize:"14px",color:"#666",textAlign:"center"}},"✍️ Firmá en el recuadro"));
  var canvas=h("canvas",{className:"sig-canvas"});
  wrap.appendChild(canvas);

  var drawing=false,lastPos={x:0,y:0};

  setTimeout(function(){
    var r=canvas.getBoundingClientRect();
    canvas.width=r.width*2; canvas.height=r.height*2;
    var ctx=canvas.getContext("2d");
    ctx.scale(2,2);
    ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.lineWidth=2.5; ctx.strokeStyle="#1a1a2e";
  },50);

  function gp(ev){
    var r=canvas.getBoundingClientRect(),t=ev.touches?ev.touches[0]:ev;
    return{x:t.clientX-r.left,y:t.clientY-r.top};
  }
  canvas.addEventListener("mousedown",function(e){e.preventDefault();drawing=true;lastPos=gp(e);});
  canvas.addEventListener("mousemove",function(e){if(!drawing)return;e.preventDefault();var ctx=canvas.getContext("2d"),p=gp(e);ctx.beginPath();ctx.moveTo(lastPos.x,lastPos.y);ctx.lineTo(p.x,p.y);ctx.stroke();lastPos=p;});
  canvas.addEventListener("mouseup",function(){drawing=false;});
  canvas.addEventListener("mouseleave",function(){drawing=false;});
  canvas.addEventListener("touchstart",function(e){e.preventDefault();drawing=true;lastPos=gp(e);});
  canvas.addEventListener("touchmove",function(e){if(!drawing)return;e.preventDefault();var ctx=canvas.getContext("2d"),p=gp(e);ctx.beginPath();ctx.moveTo(lastPos.x,lastPos.y);ctx.lineTo(p.x,p.y);ctx.stroke();lastPos=p;});
  canvas.addEventListener("touchend",function(){drawing=false;});

  wrap.appendChild(h("div",{style:{display:"flex",gap:"10px",marginTop:"14px"}},[
    h("button",{className:"btn btn-ghost",onClick:function(){canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);}},"Limpiar"),
    h("button",{className:"btn btn-red",onClick:onCancel},"Cancelar"),
    h("button",{className:"btn btn-primary",style:{flex:"1"},onClick:function(){onSave(canvas.toDataURL("image/png"));}},"Confirmar")
  ]));

  parent.appendChild(wrap);
}

function dlBlob(c,n){
  var b=new Blob([c],{type:"text/csv;charset=utf-8;"});
  var u=URL.createObjectURL(b);
  var a=document.createElement("a"); a.href=u; a.download=n; a.click();

}
function importCSV(evt,coId){
  var file=evt.target.files[0];
  if(!file||!coId){showToast("Seleccioná empresa","error");return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    var lines=String(ev.target.result||"").split("\n").map(function(l){return l.trim();}).filter(Boolean);
    if(lines.length<2){showToast("Archivo vacío","error");return;}

    var nE=[],nB=[];
    for(var i=1;i<lines.length;i++){
      var c=lines[i].split(/[;,]/).map(function(s){return s.trim();});
      if(c.length<2||!c[0]||!c[1]) continue;

      var nm=c[0],dn=c[1],cd=dn.replace(/\D/g,"");
      var ex=S.employees.some(function(e){return (e.dni||"").replace(/\D/g,"")===cd;}) || nE.some(function(e){return (e.dni||"").replace(/\D/g,"")===cd;});
      var eid;

      if(!ex){eid=gid(); nE.push({id:eid,name:nm,dni:dn,companyId:coId});}
      else{
        var f=S.employees.find(function(e){return (e.dni||"").replace(/\D/g,"")===cd;});
        eid = f ? f.id : nE.find(function(e){return (e.dni||"").replace(/\D/g,"")===cd;}).id;
      }

      if(eid){
        var b1a=parseFloat(c[3])||0, b2a=parseFloat(c[5])||0;
        if(b1a>0) nB.push({id:gid(),employeeId:eid,companyId:coId,amount:b1a,remainingBalance:b1a,label:c[2]||"Bono 1",date:new Date().toISOString()});
        if(b2a>0) nB.push({id:gid(),employeeId:eid,companyId:coId,amount:b2a,remainingBalance:b2a,label:c[4]||"Bono 2",date:new Date().toISOString()});
      }
    }

    S.employees=S.employees.concat(nE);
    S.bonos=S.bonos.concat(nB);

    nE.forEach(function(e){ addPending('upsert','employees',toCloudEmployee(e)); });
    nB.forEach(function(b){ addPending('upsert','bonos',toCloudBono(b)); });

    saveLocal();
    showToast(nE.length+" emp + "+nB.length+" bonos ✓");
    syncToCloud();
    render();
  };
  reader.readAsText(file);
}
function addBulkBonos(coId,ta){
  if(!coId||!ta.value.trim()){showToast("Seleccioná empresa y pegá listado","error");return;}
  var lines=ta.value.trim().split("\n").filter(Boolean);
  var nE=[],nB=[];

  for(var i=0;i<lines.length;i++){
    var parts=lines[i].split(/[,;\t]+/).map(function(s){return s.trim();});
    if(parts.length<3) continue;

    var nombre=parts[0],dni=parts[1],amt=parseFloat(parts[2]),lbl=parts[3]||"Bono";
    if(!nombre||!dni||!(amt>0)) continue;

    var cd=dni.replace(/\D/g,"");
    var emp=S.employees.find(function(e){return e.companyId===coId && (e.dni||"").replace(/\D/g,"")===cd;});
    var eid;

    if(emp) eid=emp.id;
    else{
      var fn=nE.find(function(e){return (e.dni||"").replace(/\D/g,"")===cd;});
      if(fn) eid=fn.id;
      else{ eid=gid(); nE.push({id:eid,name:nombre,dni:dni,companyId:coId}); }
    }

    nB.push({id:gid(),employeeId:eid,companyId:coId,amount:amt,remainingBalance:amt,label:lbl,date:new Date().toISOString()});
  }

  if(!nB.length){showToast("Sin datos válidos","error");return;}

  S.employees=S.employees.concat(nE);
  S.bonos=S.bonos.concat(nB);

  nE.forEach(function(e){ addPending('upsert','employees',toCloudEmployee(e)); });
  nB.forEach(function(b){ addPending('upsert','bonos',toCloudBono(b)); });

  saveLocal();
  ta.value="";
  showToast(nB.length+" bonos"+(nE.length>0?" + "+nE.length+" emp nuevos":"")+" ✓");
  syncToCloud();
  render();
}

   REPORTS
   ========================= */
function rData(){
  var f=S.transactions.filter(function(t){return (t.date||"").startsWith(S.rMonth);});
  if(S.rCo!=="all") f=f.filter(function(t){return t.companyId===S.rCo;});
  return f;
}
function rSum(){
  var d=rData(), r={};
  d.forEach(function(t){
    var co=S.companies.find(function(c){return c.id===t.companyId;});
    var n=co?co.name:"?";
    if(!r[n]) r[n]={total:0,count:0,emps:{}};
    r[n].total += (Number(t.amount)||0);
    r[n].count++;
    r[n].emps[t.employeeDni]=1;
  });
  return Object.keys(r).map(function(n){ return {name:n,total:r[n].total,count:r[n].count,empCount:Object.keys(r[n].emps).length}; });
}
function exportPDF(){
  var d=rData(), e=rSum(), ml=monthLabel(S.rMonth), cn=S.rCo==="all"?"Todas":(S.companies.find(function(c){return c.id===S.rCo;})||{}).name;
  var ht='<html><head><meta charset="utf-8"><title>Reporte '+ml+'</title>'
    +'<style>body{font-family:Arial;padding:40px;color:#222}h1{color:#0041a3;font-size:22px}'
    +'h2{color:#333;font-size:16px;margin:20px 0 8px}.sub{color:#666;font-size:13px;margin-bottom:20px}'
    +'table{width:100%;border-collapse:collapse;font-size:12px}th{background:#0041a3;color:#fff;padding:8px;text-align:left}'
    +'td{padding:6px;border-bottom:1px solid #ddd}tr:nth-child(even){background:#f5f8fc}'
    +'.sc{display:inline-block;background:#f0f4f8;border-radius:10px;padding:14px 20px;margin:0 10px 10px 0;text-align:center}'
    +'.sc .n{font-size:24px;font-weight:bold;color:#0041a3}.sc .l{font-size:10px;color:#666}'
    +'.fi{height:35px}.ft{margin-top:30px;font-size:10px;color:#999;text-align:center;border-top:1px solid #ddd;padding-top:10px}'
    +'</style></head><body>'
    +'<h1>Luconi — Reporte: '+ml+'</h1><p class="sub">'+cn+' · '+fmtDS(new Date().toISOString())+'</p>';

  if(e.length>0){
    ht+='<h2>Resumen</h2>';
    e.forEach(function(x){
      ht+='<div class="sc"><div class="n">'+x.count+'</div><div class="l">Visitas</div></div>'
         +'<div class="sc"><div class="n">'+x.empCount+'</div><div class="l">Empleados</div></div>';
      if(x.total>0) ht+='<div class="sc"><div class="n">'+fmtC(x.total)+'</div><div class="l">Total</div></div>';
      ht+='<p style="font-weight:600;margin:4px 0 14px">'+x.name+'</p>';
    });
  }

  ht+='<h2>Detalle</h2>';
  if(!d.length) ht+='<p>Sin visitas.</p>';
  else{
    ht+='<table><thead><tr><th>Fecha</th><th>Empleado</th><th>DNI</th><th>Empresa</th><th>Monto</th><th>Bonos</th><th>Caja</th><th>Firma</th></tr></thead><tbody>';
    d.forEach(function(t){
      var co=S.companies.find(function(c){return c.id===t.companyId;});
      var bl=t.bonosUsed&&t.bonosUsed.length>0?t.bonosUsed.map(function(b){return b.label+": "+fmtC(b.amount);}).join(", "):"—";
      ht+='<tr><td>'+fmtD(t.date)+'</td><td>'+t.employeeName+'</td><td>'+t.employeeDni+'</td><td>'+(co?co.name:"?")+'</td><td>'+(t.amount>0?fmtC(t.amount):"—")+'</td><td>'+bl+'</td><td>'+(t.caja||"—")+'</td><td>'+(t.signature?'<img src="'+t.signature+'" class="fi"/>':"—")+'</td></tr>';
    });
    ht+='</tbody></table>';
  }

  ht+='<div class="ft">Supermercado Luconi</div></body></html>';
  var w=window.open("","_blank");
  if(w){w.document.write(ht);w.document.close();setTimeout(function(){w.print();},600);}
  else showToast("Habilitá pop-ups","error");
}

    if(!cPw.value||!nPw.value||!cfPw.value){showToast("Completá todos","error");return;}
    if(cPw.value!==S.currentUser.password){showToast("Contraseña incorrecta","error");return;}
    if(nPw.value!==cfPw.value){showToast("No coinciden","error");return;}
    if(nPw.value.length<4){showToast("Mínimo 4 caracteres","error");return;}

    S.users=S.users.map(function(u){return u.id===S.currentUser.id?Object.assign({},u,{password:nPw.value}):u;});
    S.currentUser=Object.assign({},S.currentUser,{password:nPw.value});

    addPending('update','users',{password:nPw.value},S.currentUser.id);
    saveLocal();
    showToast("Contraseña cambiada ✓");
    syncToCloud();
    render();
  }},"Cambiar Contraseña"));
  el.appendChild(pwP);

  // Estado sync
  el.appendChild(h("div",{className:"panel card",style:{marginTop:"20px"}},[
    h("h3",{style:{fontSize:"15px",fontWeight:"600",color:"#0052cc",marginBottom:"10px"}},"☁️ Sincronización"),
    h("div",{style:{fontSize:"13px",color:"#666",lineHeight:"1.8"}},[
      h("div",null,"Estado: "+(DB.online?"🟢 Online":"🔴 Offline")),
      h("div",null,"Supabase: "+(DB.configured()?"✅ Configurado":"⚠️ Sin configurar")),
      h("div",null,"Pendientes: "+S.pendingSync.length+" operaciones"),
      h("div",null,"Empresas: "+S.companies.length+" · Empleados: "+S.employees.length),
      h("div",null,"Bonos: "+S.bonos.length+" · Transacciones: "+S.transactions.length)
    ]),
    h("button",{className:"btn btn-primary",style:{marginTop:"14px",fontSize:"13px"},onClick:function(){syncToCloud();showToast("Sincronizando...");}},"🔄 Forzar sincronización")
  ]));

  if(isDev){
    el.appendChild(h("div",{className:"danger-zone"},[
      h("h3",{style:{fontSize:"15px",fontWeight:"600",color:"#ef4444",marginBottom:"8px"}},"⚠️ Zona peligrosa"),
      h("p",{style:{fontSize:"12px",color:"#991b1b",marginBottom:"14px"}},"Borra TODO: empresas, empleados, bonos y transacciones."),
      h("button",{className:"btn btn-red btn-full",onClick:function(){
        showModal("⚠️ RESETEAR","Borra todo. ¿Estás seguro?",function(){
          S.companies=[]; S.employees=[]; S.bonos=[]; S.transactions=[];
          saveLocal();
          showToast("Reseteada ✓");
          render();
        });
      }},"Resetear toda la App")
    ]));
  }
}

/* =========================
   INIT
   ========================= */
try{
  render();
  setTimeout(function(){ syncToCloud(); }, 1000);
}catch(e){
  window.__debug && window.__debug("INIT CRASH: "+(e && e.message));
}
</script>
</body>
</html>
