  <!-- ✅ Tu app sigue igual, solo que db viene de window.db -->
  <script type="text/babel">
    var { useState, useEffect, useRef, useCallback } = React;

    // ✅ usamos la instancia inicializada arriba
    var db = window.db;

    var gid = function(){ return Math.random().toString(36).slice(2,10); };
    function fmtC(n){ return "$"+Number(n).toLocaleString("es-AR",{minimumFractionDigits:2}); }
    function fmtD(d){ return new Date(d).toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
    function fmtDS(d){ return new Date(d).toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}); }

    function pad2(n){ return String(n).padStart(2,"0"); }
    function localDateKey(d){
      var x = new Date(d);
      return x.getFullYear()+"-"+pad2(x.getMonth()+1)+"-"+pad2(x.getDate());
    }
    function localMonthKey(d){
      var x = new Date(d);
      return x.getFullYear()+"-"+pad2(x.getMonth()+1);
    }
    function todayStr(){ return localDateKey(new Date()); }
    function curMonth(){ return localMonthKey(new Date()); }
    function monthLabel(m){
      var p=m.split("-");
      var ms=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      return ms[parseInt(p[1],10)-1]+" "+p[0];
    }

    function useFirestore(collection, defVal) {
      var [data, setData] = useState(defVal);
      var [loaded, setLoaded] = useState(false);

      useEffect(function() {
        var ref = db.collection(collection).doc("main");
        var unsub = ref.onSnapshot(function(doc) {
          if (doc.exists) {
            setData(doc.data().items || defVal);
          } else {
            ref.set({ items: defVal }, { merge: true }).catch(function(e){
              console.error("seed", collection, e);
            });
            setData(defVal);
          }
          setLoaded(true);
        }, function(err) {
          console.error(collection, err);
          setLoaded(true);
        });
        return unsub;
      }, [collection]);

      var save = useCallback(function(fn) {
        setData(function(prev) {
          var next = typeof fn === "function" ? fn(prev) : fn;
          db.collection(collection).doc("main").set({ items: next }, { merge: true })
            .catch(function(e){ console.error("save", collection, e); });
          return next;
        });
      }, [collection]);

      return [data, save, loaded];
    }
