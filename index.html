function fmtDS(d){ return new Date(d).toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}); }

// =============================================
// NUEVO: Hook useCollection — 1 doc por registro
// =============================================
// Cada item es un documento individual en Firestore.
// collection("users") -> doc("dev1"), doc("admin1"), etc.
// Esto elimina el límite de 1MB por documento.
// =============================================

function lsKey(col){ return "luconi_v2_"+col; }
function lsRead(col, def){
  try{ var r=localStorage.getItem(lsKey(col)); return r?JSON.parse(r):def; }catch(e){ return def; }
}
function lsWrite(col, items){
  try{ localStorage.setItem(lsKey(col), JSON.stringify(items)); }catch(e){}
}

function useCollection(collection, defaultItems) {
  var [data, setData] = useState([]);
  var [loaded, setLoaded] = useState(false);
  var defaultItems_ = defaultItems || [];

  useEffect(function(){
    var mode = window.__APP_MODE__;
    var db = window.__DB__;

    // LOCAL MODE
    if(mode !== "firestore" || !db){
      var stored = lsRead(collection, null);
      if(!stored && defaultItems_.length > 0){
        lsWrite(collection, defaultItems_);
        setData(defaultItems_);
      } else {
        setData(stored || []);
      }
      setLoaded(true);
      return;
    }

    // FIRESTORE MODE: listen to entire collection
    var unsub = db.collection(collection).onSnapshot(function(snapshot){
      var items = [];
      snapshot.forEach(function(doc){
        var d = doc.data();
        d.id = doc.id;
        items.push(d);
      });

      // Seed defaults if empty
      if(items.length === 0 && defaultItems_.length > 0){
        var batch = db.batch();
        defaultItems_.forEach(function(item){
          var ref = db.collection(collection).doc(item.id);
          batch.set(ref, item);
        });
        batch.commit().catch(function(e){
          console.warn("seed fail", collection, e);
          window.__APP_MODE__ = "local";
          lsWrite(collection, defaultItems_);
          setData(defaultItems_);
        });
        // snapshot listener will fire again after seed
      } else {
        setData(items);
        // Also cache locally for offline
        lsWrite(collection, items);
      }
      setLoaded(true);
    }, function(err){
      console.warn("snapshot err -> local", collection, err);
      window.__APP_MODE__ = "local";
      setData(lsRead(collection, defaultItems_));
      setLoaded(true);
    });

    return function(){ try{ unsub(); }catch(e){} };
  }, [collection]);

  // ADD one or more docs
  var add = useCallback(function(items){
    var arr = Array.isArray(items) ? items : [items];
    arr.forEach(function(item){ if(!item.id) item.id = gid(); });
    var mode = window.__APP_MODE__;
    var db = window.__DB__;

    if(mode === "firestore" && db){
      var batch = db.batch();
      arr.forEach(function(item){
        batch.set(db.collection(collection).doc(item.id), item);
      });
      batch.commit().catch(function(e){
        console.warn("add fail -> local", e);
        setData(function(p){ var n=[...p,...arr]; lsWrite(collection,n); return n; });
      });
    } else {
      setData(function(p){ var n=[...p,...arr]; lsWrite(collection,n); return n; });
    }
  }, [collection]);

  // UPDATE a doc by id
  var update = useCallback(function(id, fields){
    var mode = window.__APP_MODE__;
    var db = window.__DB__;

    if(mode === "firestore" && db){
      db.collection(collection).doc(id).update(fields).catch(function(e){
        console.warn("update fail -> local", e);
        setData(function(p){
          var n=p.map(function(x){ return x.id===id?Object.assign({},x,fields):x; });
          lsWrite(collection,n); return n;
        });
      });
    } else {
      setData(function(p){
        var n=p.map(function(x){ return x.id===id?Object.assign({},x,fields):x; });
        lsWrite(collection,n); return n;
      });
    }
  }, [collection]);

  // REMOVE a doc by id
  var remove = useCallback(function(id){
    var mode = window.__APP_MODE__;
    var db = window.__DB__;

    if(mode === "firestore" && db){
      db.collection(collection).doc(id).delete().catch(function(e){
        console.warn("del fail -> local", e);
        setData(function(p){ var n=p.filter(function(x){return x.id!==id;}); lsWrite(collection,n); return n; });
      });
    } else {
      setData(function(p){ var n=p.filter(function(x){return x.id!==id;}); lsWrite(collection,n); return n; });
    }
  }, [collection]);

  // REMOVE by field match
  var removeWhere = useCallback(function(field, val){
    var mode = window.__APP_MODE__;
    var db = window.__DB__;

    if(mode === "firestore" && db){
      db.collection(collection).where(field, "==", val).get().then(function(snap){
        var batch = db.batch();
        snap.forEach(function(doc){ batch.delete(doc.ref); });
        return batch.commit();
      }).catch(function(e){
        console.warn("delWhere fail -> local", e);
        setData(function(p){ var n=p.filter(function(x){return x[field]!==val;}); lsWrite(collection,n); return n; });
      });
    } else {
      setData(function(p){ var n=p.filter(function(x){return x[field]!==val;}); lsWrite(collection,n); return n; });
    }
  }, [collection]);

  // CLEAR all docs
  var clearAll = useCallback(function(){
    var mode = window.__APP_MODE__;
    var db = window.__DB__;

    if(mode === "firestore" && db){
      db.collection(collection).get().then(function(snap){
        var batch = db.batch();
        snap.forEach(function(doc){ batch.delete(doc.ref); });
        return batch.commit();
      }).catch(function(e){ console.warn("clearAll fail", e); });
    }
    setData([]);
    lsWrite(collection, []);
  }, [collection]);

  return { data: data, loaded: loaded, add: add, update: update, remove: remove, removeWhere: removeWhere, clearAll: clearAll };
}

// Firmas se guardan aparte para que las transacciones sean livianas
function saveSig(txId, sigData){
  var mode = window.__APP_MODE__;
  var db = window.__DB__;
  if(mode === "firestore" && db){
    db.collection("signatures").doc(txId).set({ data: sigData }).catch(function(){});
  }
  try{ localStorage.setItem("sig_"+txId, sigData); }catch(e){}
}
function getSig(txId){
  try{ return localStorage.getItem("sig_"+txId)||null; }catch(e){ return null; }
}

function SignaturePad(props){
  var canvasRef=useRef(null),drawing=useRef(false),lastPos=useRef({x:0,y:0});
  useEffect(function(){
    var c=canvasRef.current; if(!c) return;
    var ctx=c.getContext("2d"),r=c.getBoundingClientRect();
    c.width=r.width*2;c.height=r.height*2;
    ctx.scale(2,2); ctx.lineCap="round"; ctx.lineJoin="round"; ctx.lineWidth=2.5; ctx.strokeStyle="#1a1a2e";
  },[]);
  function gp(ev){ var r=canvasRef.current.getBoundingClientRect(),t=ev.touches?ev.touches[0]:ev; return{x:t.clientX-r.left,y:t.clientY-r.top}; }
  return(
    <div style={{background:"#fff",borderRadius:16,padding:20,boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}>
      <p style={{margin:"0 0 10px",fontSize:14,color:"#666",textAlign:"center"}}>✍️ Firmá en el recuadro</p>
      <canvas ref={canvasRef} style={{width:"100%",height:150,border:"2px dashed #ccc",borderRadius:10,cursor:"crosshair",touchAction:"none",background:"#fafafa"}}
        onMouseDown={function(e){e.preventDefault();drawing.current=true;lastPos.current=gp(e);}}
        onMouseMove={function(e){if(!drawing.current)return;e.preventDefault();var ctx=canvasRef.current.getContext("2d"),p=gp(e);ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();lastPos.current=p;}}
        onMouseUp={function(){drawing.current=false;}}
        onMouseLeave={function(){drawing.current=false;}}
        onTouchStart={function(e){e.preventDefault();drawing.current=true;lastPos.current=gp(e);}}
        onTouchMove={function(e){if(!drawing.current)return;e.preventDefault();var ctx=canvasRef.current.getContext("2d"),p=gp(e);ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();lastPos.current=p;}}
        onTouchEnd={function(){drawing.current=false;}}
      />
      <div style={{display:"flex",gap:10,marginTop:14}}>
        <button onClick={function(){var c=canvasRef.current;c.getContext("2d").clearRect(0,0,c.width,c.height);}} style={BS("#e0e0e0","#333")}>Limpiar</button>
        <button onClick={props.onCancel} style={BS("#e74c3c","#fff")}>Cancelar</button>
        <button onClick={function(){props.onSave(canvasRef.current.toDataURL("image/png"));}} style={{...BS("#0052cc","#fff"),flex:1}}>Confirmar</button>
      </div>
    </div>
  );
}

  function importCSV(evt){

    var reader=new FileReader();
    reader.onload=function(ev){
      var lines=String(ev.target.result||"").split("\n").map(function(l){return l.trim();}).filter(Boolean);
      if(lines.length<2){show("Vacío","error");return;}
      var nE=[],nB=[],eA=0,bA=0;
      for(var i=1;i<lines.length;i++){
        var c=lines[i].split(/[;,]/).map(function(s){return s.trim();});
        if(c.length<2||!c[0]||!c[1])continue;
        var nm=c[0],dn=c[1],cd=dn.replace(/\D/g,"");
        var ex=employees.some(function(e){return e.dni.replace(/\D/g,"")===cd;})||nE.some(function(e){return e.dni.replace(/\D/g,"")===cd;});
        var eid;
        if(!ex){eid=gid();nE.push({id:eid,name:nm,dni:dn,companyId:importCo});eA++;}
        else{
          var f=employees.find(function(e){return e.dni.replace(/\D/g,"")===cd;});
          eid=f?f.id:nE.find(function(e){return e.dni.replace(/\D/g,"")===cd;}).id;
        }
        if(eid){
          var b1a=parseFloat(c[3])||0,b2a=parseFloat(c[5])||0;
          if(b1a>0){nB.push({id:gid(),employeeId:eid,companyId:importCo,amount:b1a,remainingBalance:b1a,label:c[2]||"Bono 1",date:new Date().toISOString()});bA++;}
          if(b2a>0){nB.push({id:gid(),employeeId:eid,companyId:importCo,amount:b2a,remainingBalance:b2a,label:c[4]||"Bono 2",date:new Date().toISOString()});bA++;}
        }
      }
      if(nE.length>0) employeesCol.add(nE);
      if(nB.length>0) bonosCol.add(nB);
      show(eA+" empleados + "+bA+" bonos ✓");
      if(fileRef.current)fileRef.current.value="";
    };
    reader.readAsText(file);
  }

                      <div style={{marginTop:14}}>
                        <div style={{fontSize:12,fontWeight:800,color:"#5a6a7a",marginBottom:8}}>
                          BONOS — Total: <span style={{color:"#27ae60",fontSize:14}}>{fmtC(getTB(found.id))}</span>
                        </div>
                        {getEB(found.id).map(function(b){
                          var sel=selectedBonos.includes(b.id);
                          return(
                            <label key={b.id} onClick={function(){toggleBono(b.id);}} style={{display:"flex",alignItems:"center",gap:10,background:sel?"#d4edda":"#f8f9fa",border:sel?"2px solid #27ae60":"2px solid #e2e8f0",borderRadius:10,padding:"10px 14px",marginBottom:6,cursor:"pointer"}}>
                              <input type="checkbox" checked={sel} readOnly style={{width:18,height:18,accentColor:"#27ae60"}} />
                              <div style={{flex:1}}>
                                <div style={{fontWeight:800,fontSize:14}}>{b.label}</div>
                                <div style={{fontSize:11,color:"#888"}}>{fmtDS(b.date)}</div>
                              </div>
                              <div style={{fontWeight:900,color:"#27ae60",fontSize:16}}>{fmtC(b.remainingBalance)}</div>
                            </label>
                          );
                        })}
                        <div style={{fontSize:11,color:"#666",marginTop:8}}>*Tildá el/los bono(s) y firmá.*</div>
                      </div>
                    ) : (
                      <div style={{marginTop:10,fontSize:13,color:"#888",fontStyle:"italic"}}>Sin bonos</div>
                    )}
                  </div>
                  {!showSig ? (
                    <div>
                      <label style={LS}>Caja</label>
                      <div style={{display:"flex",gap:10,marginBottom:18}}>
                        <button onClick={function(){setSelectedCaja("1");}} style={{...BS(selectedCaja==="1"?"#0052cc":"#e2e8f0",selectedCaja==="1"?"#fff":"#333"),flex:1,fontSize:18,padding:16}}>🔵 Caja 1</button>
                        <button onClick={function(){setSelectedCaja("2");}} style={{...BS(selectedCaja==="2"?"#0052cc":"#e2e8f0",selectedCaja==="2"?"#fff":"#333"),flex:1,fontSize:18,padding:16}}>🟢 Caja 2</button>
                      </div>
                      <button onClick={function(){setShowSig(true);}} style={{...BS("#0052cc","#fff"),width:"100%",padding:16,fontSize:16}}>Continuar → Firma</button>
                    </div>
                  ) : (
                    <SignaturePad onSave={registerPurchase} onCancel={function(){setShowSig(false);}} />
                  )}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ========= BONOS ========= */}
        {view==="bonos"&&isAdmin&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>🎁 Gestión de Bonos</h2>
            <div className="card" style={{background:"#fff",borderRadius:18,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
              <h3 style={{fontSize:16,fontWeight:700,marginBottom:14}}>Cargar bono individual</h3>
              <label style={LS}>Empresa</label>
              <select value={bonoCo} onChange={function(e){setBonoCo(e.target.value);setBonoEmpId("");setBonoEmpSearch("");}} style={{...IS,marginBottom:12}}>
                <option value="">Seleccionar...</option>
                {companies.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}
              </select>
              {bonoCo&&(
                <div>
                  <label style={LS}>Buscar empleado</label>
                  <input placeholder="Nombre o DNI..." value={bonoEmpSearch} onChange={function(e){setBonoEmpSearch(e.target.value);}} style={{...IS,marginBottom:8}} />
                  {filteredEmps.slice(0,8).map(function(e){
                    var sel=bonoEmpId===e.id;
                    return(
                      <div key={e.id} onClick={function(){setBonoEmpId(e.id);}} style={{padding:"10px 14px",background:sel?"#eef6ff":"#f8f9fa",border:sel?"2px solid #0052cc":"1px solid #e2e8f0",borderRadius:10,marginBottom:4,cursor:"pointer"}}>
                        <span style={{fontWeight:700}}>{e.name}</span> <span style={{color:"#888",fontSize:12}}>— DNI {e.dni}</span>
                      </div>
                    );
                  })}
                  {bonoEmpId&&(
                    <div style={{marginTop:12}}>
                      <label style={LS}>Etiqueta</label>
                      <input placeholder="Ej: Bono mensual" value={bonoLabel} onChange={function(e){setBonoLabel(e.target.value);}} style={{...IS,marginBottom:10}} />
                      <label style={LS}>Monto</label>
                      <input type="number" placeholder="50000" value={bonoAmt} onChange={function(e){setBonoAmt(e.target.value);}} style={{...IS,marginBottom:14}} />
                      <button onClick={addBono} style={{...BS("#27ae60","#fff"),width:"100%",padding:14}}>Cargar Bono</button>
                    </div>
                  )}
                </div>
              )}
            </div>
            <div className="card" style={{background:"#fff",borderRadius:18,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
              <h3 style={{fontSize:16,fontWeight:700,marginBottom:14}}>Carga masiva (pegar texto)</h3>
              <label style={LS}>Empresa</label>
              <select value={bulkBonoCo} onChange={function(e){setBulkBonoCo(e.target.value);}} style={{...IS,marginBottom:10}}>
                <option value="">Seleccionar...</option>
                {companies.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}
              </select>
              <label style={LS}>Etiqueta por defecto</label>
              <input placeholder="Bono mensual" value={bulkBonoLabel} onChange={function(e){setBulkBonoLabel(e.target.value);}} style={{...IS,marginBottom:10}} />
              <label style={LS}>Datos (Nombre, DNI, Monto, Etiqueta)</label>
              <textarea rows={5} placeholder={"Juan Pérez, 30123456, 50000, Bono mensual\nMaría López, 28654321, 30000"} value={bulkBonoText} onChange={function(e){setBulkBonoText(e.target.value);}} style={{...IS,resize:"vertical",marginBottom:14}} />
              <button onClick={addBulkBonos} style={{...BS("#27ae60","#fff"),width:"100%",padding:14}}>Cargar Bonos</button>
            </div>
            <div className="card" style={{background:"#fff",borderRadius:18,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
              <h3 style={{fontSize:16,fontWeight:700,marginBottom:14}}>Importar desde CSV</h3>
              <label style={LS}>Empresa</label>
              <select value={importCo} onChange={function(e){setImportCo(e.target.value);}} style={{...IS,marginBottom:10}}>
                <option value="">Seleccionar...</option>
                {companies.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}
              </select>
              <input ref={fileRef} type="file" accept=".csv" onChange={importCSV} style={{marginBottom:10}} />
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={downloadPreforma} style={{...BS("#0052cc","#fff"),fontSize:12}}>📥 Descargar preforma</button>
                <button onClick={shareWA} style={{...BS("#25d366","#fff"),fontSize:12}}>📱 WhatsApp</button>
                <button onClick={shareEmail} style={{...BS("#333","#fff"),fontSize:12}}>📧 Email</button>
              </div>
            </div>
            <h3 style={{fontSize:15,fontWeight:700,color:"#0052cc",marginBottom:10}}>Bonos activos ({activeBonos.length})</h3>
            {activeBonos.length===0&&<p style={{color:"#999",textAlign:"center",padding:20}}>Sin bonos activos</p>}
            {activeBonos.map(function(b){
              var emp=employees.find(function(e){return e.id===b.employeeId;});
              return(
                <div key={b.id} className="card" style={{background:"#fff",borderRadius:14,padding:"12px 16px",marginBottom:8,border:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{emp?emp.name:"?"} <span style={{fontWeight:400,color:"#888",fontSize:12}}>— {b.label}</span></div>
                    <div style={{fontSize:12,color:"#888"}}>{fmtDS(b.date)}</div>
                  </div>
                  <span style={{fontWeight:800,color:"#27ae60",fontSize:14}}>{fmtC(b.remainingBalance)}</span>
                </div>
              );
            })}
          </div>
        )}

        {/* ========= COMPANIES ========= */}
        {view==="companies"&&isAdmin&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>🏢 Empresas</h2>
            <div className="card" style={{background:"#fff",borderRadius:18,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
              <label style={LS}>Nueva empresa</label>
              <div style={{display:"flex",gap:10}}>
                <input placeholder="Nombre" value={coForm.name} onChange={function(e){setCoForm({name:e.target.value});}} onKeyDown={function(e){if(e.key==="Enter")addCo();}} style={{...IS,flex:1}} />
                <button onClick={addCo} style={BS("#0052cc","#fff")}>Agregar</button>
              </div>
            </div>
            {companies.length===0&&<p style={{color:"#999",textAlign:"center",padding:20}}>Sin empresas</p>}
            {companies.map(function(c){
              var ce=employees.filter(function(e){return e.companyId===c.id;});
              return(
                <div key={c.id} className="card" style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:8,border:"1px solid #e2e8f0"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:15}}>{c.name}</div>
                      <div style={{fontSize:12,color:"#888"}}>{ce.length} empleados</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={function(){downloadPreformaEmp(c.id);}} style={{...BS("#eef6ff","#0052cc"),fontSize:11,padding:"6px 10px"}}>📥</button>
                      <button onClick={function(){delCo(c.id);}} style={{...BS("#ffeef0","#e74c3c"),fontSize:11,padding:"6px 10px"}}>🗑️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ========= EMPLOYEES ========= */}
        {view==="employees"&&isAdmin&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>👥 Personal</h2>
            <div className="card" style={{background:"#fff",borderRadius:18,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
              <h3 style={{fontSize:16,fontWeight:700,marginBottom:14}}>Agregar empleado</h3>
              <label style={LS}>Empresa</label>
              <select value={empForm.companyId} onChange={function(e){setEmpForm(Object.assign({},empForm,{companyId:e.target.value}));}} style={{...IS,marginBottom:10}}>
                <option value="">Seleccionar...</option>
                {companies.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}
              </select>
              <label style={LS}>Nombre</label>
              <input placeholder="Juan Pérez" value={empForm.name} onChange={function(e){setEmpForm(Object.assign({},empForm,{name:e.target.value}));}} style={{...IS,marginBottom:10}} />
              <label style={LS}>DNI</label>
              <input placeholder="30123456" value={empForm.dni} onChange={function(e){setEmpForm(Object.assign({},empForm,{dni:e.target.value}));}} style={{...IS,marginBottom:14}} />
              <button onClick={addEmp} style={{...BS("#0052cc","#fff"),width:"100%",padding:14}}>Agregar</button>
            </div>
            <div className="card" style={{background:"#fff",borderRadius:18,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
              <h3 style={{fontSize:16,fontWeight:700,marginBottom:14}}>Carga masiva</h3>
              <label style={LS}>Empresa</label>
              <select value={bulkCo} onChange={function(e){setBulkCo(e.target.value);}} style={{...IS,marginBottom:10}}>
                <option value="">Seleccionar...</option>
                {companies.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}
              </select>
              <label style={LS}>Pegar (Nombre, DNI por línea)</label>
              <textarea rows={4} placeholder={"Juan Pérez, 30123456\nMaría López, 28654321"} value={bulkText} onChange={function(e){setBulkText(e.target.value);}} style={{...IS,resize:"vertical",marginBottom:14}} />
              <button onClick={addBulk} style={{...BS("#0052cc","#fff"),width:"100%",padding:14}}>Cargar</button>
            </div>
            <h3 style={{fontSize:15,fontWeight:700,color:"#0052cc",marginBottom:10}}>Empleados ({employees.length})</h3>
            {employees.length===0&&<p style={{color:"#999",textAlign:"center",padding:20}}>Sin empleados</p>}
            {employees.map(function(e){
              var co=companies.find(function(c){return c.id===e.companyId;});
              var tb=getTB(e.id);
              return(
                <div key={e.id} className="card" style={{background:"#fff",borderRadius:14,padding:"12px 16px",marginBottom:8,border:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{e.name}</div>
                    <div style={{fontSize:12,color:"#888"}}>DNI {e.dni} · {co?co.name:"?"}{tb>0?" · Bonos: "+fmtC(tb):""}</div>
                  </div>
                  <button onClick={function(){delEmp(e.id);}} style={{...BS("#ffeef0","#e74c3c"),fontSize:11,padding:"6px 10px"}}>🗑️</button>
                </div>
              );
            })}
          </div>
        )}

        {/* ========= REPORTS ========= */}
        {view==="reports"&&isAdmin&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>📊 Reportes</h2>
            <div style={{display:"flex",gap:10,marginBottom:20}}>
              <div style={{flex:1}}>
                <label style={LS}>Mes</label>
                <input type="month" value={rMonth} onChange={function(e){setRMonth(e.target.value);}} style={IS} />
              </div>
              <div style={{flex:1}}>
                <label style={LS}>Empresa</label>
                <select value={rCo} onChange={function(e){setRCo(e.target.value);}} style={IS}>
                  <option value="all">Todas</option>
                  {companies.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}
                </select>
              </div>
            </div>
            <h3 style={{fontSize:15,fontWeight:700,color:"#0052cc",marginBottom:10}}>{monthLabel(rMonth)}</h3>
            {repE.length===0&&<p style={{color:"#999",textAlign:"center",padding:20}}>Sin datos</p>}
            {repE.map(function(s,i){
              return <SummaryCard key={i} name={s.name} count={s.count} empCount={s.empCount} total={s.total} />;
            })}
            {repR.length>0&&(
              <div>
                <h3 style={{fontSize:15,fontWeight:700,color:"#0052cc",margin:"20px 0 10px"}}>Detalle</h3>
                {repR.map(function(t){
                  var co=companies.find(function(c){return c.id===t.companyId;});
                  return(
                    <div key={t.id} className="card" style={{background:"#fff",borderRadius:14,padding:"12px 16px",marginBottom:8,border:"1px solid #e2e8f0"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{t.employeeName}</div>
                          <div style={{fontSize:12,color:"#888"}}>{fmtD(t.date)} · {co?co.name:"?"} · Caja {t.caja||"?"}</div>
                        </div>
                        {t.amount>0&&<span style={{fontWeight:800,color:"#27ae60",fontSize:14}}>{fmtC(t.amount)}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            <button onClick={exportPDF} style={{...BS("#0052cc","#fff"),width:"100%",padding:14,marginTop:20}}>🖨️ Exportar / Imprimir</button>
          </div>
        )}

        {/* ========= SETTINGS ========= */}
        {view==="settings"&&isAdmin&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>⚙️ Configuración</h2>
            <div className="card" style={{background:"#fff",borderRadius:18,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
              <h3 style={{fontSize:16,fontWeight:700,marginBottom:14}}>🔐 Mi contraseña</h3>
              <label style={LS}>Actual</label>
              <input type="password" value={myPwCur} onChange={function(e){setMyPwCur(e.target.value);}} style={{...IS,marginBottom:10}} />
              <label style={LS}>Nueva</label>
              <input type="password" value={myPwNew} onChange={function(e){setMyPwNew(e.target.value);}} style={{...IS,marginBottom:10}} />
              <label style={LS}>Confirmar</label>
              <input type="password" value={myPwConf} onChange={function(e){setMyPwConf(e.target.value);}} style={{...IS,marginBottom:14}} />
              <button onClick={changeMyPw} style={{...BS("#0052cc","#fff"),width:"100%",padding:14}}>Cambiar</button>
            </div>
            {isDev&&(
              <div className="card" style={{background:"#fff",borderRadius:18,padding:24,border:"1px solid #e2e8f0",marginBottom:20}}>
                <h3 style={{fontSize:16,fontWeight:700,marginBottom:14}}>🔑 Reset contraseña (otro usuario)</h3>
                <label style={LS}>Usuario</label>
                <select value={resetPwId} onChange={function(e){setResetPwId(e.target.value);}} style={{...IS,marginBottom:10}}>
                  <option value="">Seleccionar...</option>
                  {otherUsers.map(function(u){return <option key={u.id} value={u.id}>{u.name} ({u.username})</option>;})}
                </select>
                <label style={LS}>Nueva contraseña</label>
                <input type="password" value={resetPwVal} onChange={function(e){setResetPwVal(e.target.value);}} style={{...IS,marginBottom:14}} />
                <button onClick={resetOtherPw} style={{...BS("#e67e22","#fff"),width:"100%",padding:14}}>Resetear</button>
              </div>
            )}
            {isDev&&(
              <div className="card" style={{background:"#fff",borderRadius:18,padding:24,border:"1px solid #fcc"}}>
                <h3 style={{fontSize:16,fontWeight:700,marginBottom:14,color:"#e74c3c"}}>⚠️ Zona peligrosa</h3>
                <button onClick={resetApp} style={{...BS("#e74c3c","#fff"),width:"100%",padding:14}}>Resetear toda la app</button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:1100,background:toast.type==="error"?"#e74c3c":"#27ae60",color:"#fff",padding:"14px 28px",borderRadius:14,fontWeight:800,fontSize:14,boxShadow:"0 10px 40px rgba(0,0,0,.2)"}}>
          {toast.msg}
        </div>
      )}

      {/* Modal */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1050,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:20,padding:28,maxWidth:360,width:"100%"}}>
            <h3 style={{fontSize:18,marginBottom:10,fontWeight:900}}>{modal.title}</h3>
            <p style={{color:"#666",fontSize:14,marginBottom:20}}>{modal.msg}</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={function(){setModal(null);}} style={{...BS("#f0f4f8","#333"),flex:1}}>Cancelar</button>
              <button onClick={modal.onConfirm} style={{...BS("#e74c3c","#fff"),flex:1}}>Confirmar</button>
            </div>
          </div>
        </div>
      )}

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,.97)",backdropFilter:"blur(20px)",borderTop:"1px solid #e2e8f0",padding:"6px 4px 12px",display:"flex",justifyContent:"center",gap:1,zIndex:100}}>
        {nav.map(function(n){
          var a=view===n.key;
          return(
            <button key={n.key} onClick={function(){setView(n.key);}} style={{background:a?"#eef6ff":"transparent",border:a?"1px solid #b3d4fc":"1px solid transparent",borderRadius:12,padding:"6px 9px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:16}}>{n.icon}</span>
              <span style={{fontSize:8,fontWeight:900,color:a?"#0052cc":"#999"}}>{n.l}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
