  <script>
    // ========= Firebase init =========
    // Si falla, la app cae a modo local (localStorage) y sigue funcionando.
    (function(){
      window.__APP_MODE__ = "boot";
      window.__DB__ = null; // esto lo usa tu hook useStore
      window.fsdb = null;   // esto lo usa el objeto DB de abajo

      // ✅ Config real
      var firebaseConfig = {
        apiKey: "AIzaSyDk33-d7Xcj2mrsg-OEZdVZEleh8HMvC4o",
        authDomain: "voucher-luconi2.firebaseapp.com",
        projectId: "voucher-luconi2",
        storageBucket: "voucher-luconi2.firebasestorage.app",
        messagingSenderId: "1063324611181",
        appId: "1:1063324611181:web:43d0f04c7b838bd3450564",
        measurementId: "G-PLVN0EJTM6"
      };

      function setLocalMode(reason){
        console.warn("[Luconi] Firestore OFF -> Local mode:", reason);
        window.__APP_MODE__ = "local";
        window.__DB__ = null;
        window.fsdb = null;
      }

      try {
        // Evitar doble init si recarga/hot
        if (!firebase.apps || !firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }

        try {
          var db = firebase.firestore();
          window.__DB__ = db;
          window.fsdb = db;
          window.__APP_MODE__ = "firestore";

          // Offline persistence: si no se puede, no rompemos la app
          db.enablePersistence({ synchronizeTabs: true }).catch(function(err){
            console.warn("[Luconi] persistence disabled:", err && err.code ? err.code : err);
          });

          // Health check (si reglas bloquean, cae a local)
          db.collection("__health").doc("ping").get().catch(function(e){
            if (e && (e.code === "permission-denied" || e.code === "unauthenticated")) {
              setLocalMode("Firestore rules block read (" + e.code + ")");
            } else {
              console.warn("[Luconi] health check warn:", e);
            }
          });

        } catch (e2) {
          setLocalMode("firestore init error: " + (e2 && e2.message ? e2.message : e2));
        }

      } catch (e1) {
        setLocalMode("firebase init error: " + (e1 && e1.message ? e1.message : e1));
      }

      // Service worker (opcional)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(function(){});
      }
    })();
  </script>

  <script>
    // ========= Utils global (para DB) =========
    function gid(){ return Math.random().toString(36).slice(2,10); }

    // ========= DB (Firestore table/main -> {items: []}) =========
    // ✅ Reemplazá tu objeto DB entero por este
    var DB = {
      online: navigator.onLine,
      syncing: false,

      configured: function () {
        return typeof fsdb !== "undefined" && !!fsdb;
      },

      _mainRef: function (table) {
        return fsdb.collection(table).doc("main");
      },

      _getItems: function (table) {
        return this._mainRef(table).get().then(function (doc) {
          var d = doc.exists ? (doc.data() || {}) : {};
          return Array.isArray(d.items) ? d.items : [];
        });
      },

      _setItems: function (table, items) {
        return this._mainRef(table).set({ items: items }, { merge: true }).then(function () {
          return items;
        });
      },

      select: function (table) {
        if (!this.configured()) return Promise.reject("no_firestore");
        return this._getItems(table);
      },

      selectTx: function () {
        return this.select("transactions");
      },

      // update: mergea fields dentro del item con id
      update: function (table, id, data) {
        if (!this.configured()) return Promise.reject("no_firestore");
        if (!id) return Promise.reject("missing_id");

        var self = this;
        return self._getItems(table).then(function (items) {
          var idx = items.findIndex(function (x) { return x && x.id === id; });
          if (idx === -1) return items; // no existe => no rompe
          items[idx] = Object.assign({}, items[idx], data || {});
          return self._setItems(table, items);
        }).then(function () { return []; });
      },

      // upsert: agrega o reemplaza por id
      upsert: function (table, data) {
        if (!this.configured()) return Promise.reject("no_firestore");
        var arr = Array.isArray(data) ? data : [data];
        var self = this;

        return self._getItems(table).then(function (items) {
          arr.forEach(function (item) {
            if (!item) return;
            if (!item.id) item.id = gid();
            var idx = items.findIndex(function (x) { return x && x.id === item.id; });
            if (idx === -1) items.push(item);
            else items[idx] = Object.assign({}, items[idx], item);
          });
          return self._setItems(table, items);
        }).then(function () { return arr; });
      },

      del: function (table, id) {
        if (!this.configured()) return Promise.reject("no_firestore");
        if (!id) return Promise.reject("missing_id");

        var self = this;
        return self._getItems(table).then(function (items) {
          items = items.filter(function (x) { return x && x.id !== id; });
          return self._setItems(table, items);
        }).then(function () { return []; });
      },

      delWhere: function (table, col, val) {
        if (!this.configured()) return Promise.reject("no_firestore");

        var self = this;
        return self._getItems(table).then(function (items) {
          items = items.filter(function (x) { return !(x && x[col] === val); });
          return self._setItems(table, items);
        }).then(function () { return []; });
      }
    };
  </script>

  <script type="text/babel">
    var { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ========= Utils =========
    var gid = window.gid; // usa la misma función global
    function fmtC(n){ return "$"+Number(n).toLocaleString("es-AR",{minimumFractionDigits:2}); }
    function fmtD(d){ return new Date(d).toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
    function fmtDS(d){ return new Date(d).toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}); }

    function pad2(n){ return String(n).padStart(2,"0"); }
    function localDateKey(d){
      var x = new Date(d);
      return x.getFullYear()+"-"+pad2(x.getMonth()+1)+"-"+pad2(x.getDate());
    }
    function localMonthKey(d){
      var x = new Date(d);
      return x.getFullYear()+"-"+pad2(x.getMonth()+1);
    }
    function todayStr(){ return localDateKey(new Date()); }
    function curMonth(){ return localMonthKey(new Date()); }
    function monthLabel(m){
      var p=m.split("-");
      var ms=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      return ms[parseInt(p[1],10)-1]+" "+p[0];
    }

    // ========= UI styles =========
    var BS=function(bg,col){return{background:bg,color:col,border:"none",borderRadius:10,padding:"12px 20px",fontWeight:600,fontSize:14,cursor:"pointer",transition:"transform .08s ease"};};
    var IS={width:"100%",padding:"14px 16px",background:"#f0f4f8",border:"2px solid #dce3eb",borderRadius:12,color:"#1a1a2e",fontSize:15};
    var LS={display:"block",fontSize:12,fontWeight:700,color:"#5a6a7a",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5};

    // ========= Default users =========
    var DEFAULT_USERS=[
      {id:"dev1",username:"developer",password:"dev2024",name:"Desarrollador",role:"dev"},
      {id:"admin1",username:"admin",password:"admin123",name:"Administradora",role:"admin"},
      {id:"recep1",username:"recepcion",password:"recep123",name:"Recepcionista",role:"recepcion"}
    ];
    var ROLE_LABELS={dev:"🔧 Desarrollador",admin:"🔑 Administradora",recepcion:"🛒 Recepción"};

    // ========= Local storage helpers =========
    function lsKey(collection){ return "luconi_"+collection+"_main"; }
    function lsRead(collection, defVal){
      try{
        var raw = localStorage.getItem(lsKey(collection));
        if(!raw) return defVal;
        var obj = JSON.parse(raw);
        return (obj && obj.items) ? obj.items : defVal;
      }catch(e){
        return defVal;
      }
    }
    function lsWrite(collection, items){
      try{
        localStorage.setItem(lsKey(collection), JSON.stringify({ items: items }));
      }catch(e){}
    }

    // ========= Firestore/local hook =========
    function useStore(collection, defVal) {
      var [data, setData] = useState(defVal);
      var [loaded, setLoaded] = useState(false);

      useEffect(function(){
        var mode = window.__APP_MODE__;
        var db = window.__DB__;

        // LOCAL MODE
        if(mode !== "firestore" || !db){
          var initial = lsRead(collection, defVal);

          // Si no había nada y el default es no-vacío, sembramos local
          if(initial === defVal && Array.isArray(defVal) && defVal.length > 0){
            lsWrite(collection, defVal);
            initial = defVal;
          }

          setData(initial);
          setLoaded(true);
          return;
        }

        // FIRESTORE MODE (table/main -> {items})
        var unsub = db.collection(collection).doc("main").onSnapshot(function(doc){
          if(doc.exists){
            setData((doc.data() && doc.data().items) ? doc.data().items : defVal);
          }else{
            db.collection(collection).doc("main").set({ items: defVal }, { merge: true })
              .catch(function(e){
                console.warn("seed fail -> fallback local", collection, e);
                window.__APP_MODE__ = "local";
                var initial = lsRead(collection, defVal);
                setData(initial);
              });
            setData(defVal);
          }
          setLoaded(true);
        }, function(err){
          console.warn("firestore snapshot err -> fallback local", collection, err);
          window.__APP_MODE__ = "local";
          var initial = lsRead(collection, defVal);
          setData(initial);
          setLoaded(true);
        });

        return function(){ try{unsub && unsub();}catch(e){} };
      }, [collection]);

      var save = useCallback(function(fn){
        setData(function(prev){
          var next = (typeof fn === "function") ? fn(prev) : fn;

          var mode = window.__APP_MODE__;
          var db = window.__DB__;

          if(mode === "firestore" && db){
            db.collection(collection).doc("main").set({ items: next }, { merge: true })
              .catch(function(e){
                console.warn("save fail -> fallback local", collection, e);
                window.__APP_MODE__ = "local";
                lsWrite(collection, next);
              });
          } else {
            lsWrite(collection, next);
          }
          return next;
        });
      }, [collection]);

      return [data, save, loaded];
    }

    // ========= Components =========
    function SignaturePad(props){
      var canvasRef=useRef(null),drawing=useRef(false),lastPos=useRef({x:0,y:0});

      useEffect(function(){
        var c=canvasRef.current;
        if(!c) return;
        var ctx=c.getContext("2d"),r=c.getBoundingClientRect();
        c.width=r.width*2;c.height=r.height*2;
        ctx.scale(2,2);
        ctx.lineCap="round";
        ctx.lineJoin="round";
        ctx.lineWidth=2.5;
        ctx.strokeStyle="#1a1a2e";
      },[]);

      function gp(ev){
        var r=canvasRef.current.getBoundingClientRect(),t=ev.touches?ev.touches[0]:ev;
        return{x:t.clientX-r.left,y:t.clientY-r.top};
      }

      return(
        <div style={{background:"#fff",borderRadius:16,padding:20,boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}>
          <p style={{margin:"0 0 10px",fontSize:14,color:"#666",textAlign:"center"}}>✍️ Firmá en el recuadro</p>
          <canvas ref={canvasRef} style={{width:"100%",height:150,border:"2px dashed #ccc",borderRadius:10,cursor:"crosshair",touchAction:"none",background:"#fafafa"}}
            onMouseDown={function(e){e.preventDefault();drawing.current=true;lastPos.current=gp(e);}}
            onMouseMove={function(e){if(!drawing.current)return;e.preventDefault();var ctx=canvasRef.current.getContext("2d"),p=gp(e);ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();lastPos.current=p;}}
            onMouseUp={function(){drawing.current=false;}} onMouseLeave={function(){drawing.current=false;}}
            onTouchStart={function(e){e.preventDefault();drawing.current=true;lastPos.current=gp(e);}}
            onTouchMove={function(e){if(!drawing.current)return;e.preventDefault();var ctx=canvasRef.current.getContext("2d"),p=gp(e);ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();lastPos.current=p;}}
            onTouchEnd={function(){drawing.current=false;}} />
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button onClick={function(){var c=canvasRef.current;c.getContext("2d").clearRect(0,0,c.width,c.height);}} style={BS("#e0e0e0","#333")}>Limpiar</button>
            <button onClick={props.onCancel} style={BS("#e74c3c","#fff")}>Cancelar</button>
            <button onClick={function(){props.onSave(canvasRef.current.toDataURL("image/png"));}} style={{...BS("#0052cc","#fff"),flex:1}}>Confirmar</button>
          </div>
        </div>
      );
    }

    // ========= App =========
    function App(){
      // (Dejo tu app tal cual la venías armando: acá pegá tu bloque completo
      // desde "function App() { ... }" hasta el return final.)
      // En tu mensaje ya venía enorme y estaba cortado con comentario "RESTO DE UI".
      // Para que compile, mínimo devolvemos un placeholder si falta.
      return (
        <div style={{padding:24, textAlign:"center"}}>
          <h2 style={{color:"#0041a3"}}>Luconi Vouchers</h2>
          <p>Tu App está cargando el core. Si querés, pegá el bloque completo de App (la parte que faltó) y te lo dejo 100% armado.</p>
          <p style={{marginTop:10, fontSize:12, color:"#666"}}>
            Modo: {window.__APP_MODE__ === "firestore" ? "☁️ Firestore" : "💾 Local"}
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
