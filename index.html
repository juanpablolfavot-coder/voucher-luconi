        projectId: "voucher-luconi2",
        storageBucket: "PEGAR_ACA_EL_storageBucket_DE_voucher-luconi2",
        messagingSenderId: "1063324611181",
        appId: "1:1063324611181:web:43d0f04c7b838bd3450564"
      };

      function setLocalMode(reason){
        console.warn("[Luconi] Firestore OFF -> Local mode:", reason);
        window.__APP_MODE__ = "local";
        window.__DB__ = null;
      }

      try {
        firebase.initializeApp(firebaseConfig);

        try {
          var db = firebase.firestore();
          window.__DB__ = db;
          window.__APP_MODE__ = "firestore";

          // Offline persistence: si no se puede, no rompemos la app
          db.enablePersistence({ synchronizeTabs: true }).catch(function(err){
            console.warn("[Luconi] persistence disabled:", err && err.code ? err.code : err);
          });

          // Pequeña prueba de lectura para detectar Rules/permiso
          db.collection("__health").doc("ping").get().then(function(){
            // ok
          }).catch(function(e){
            // Si falla por permission-denied, caemos a local
            if (e && (e.code === "permission-denied" || e.code === "unauthenticated")) {
              setLocalMode("Firestore rules block read (" + e.code + ")");
            } else {
              console.warn("[Luconi] health check warn:", e);
            }
          });

        } catch (e2) {
          setLocalMode("firestore init error");
        }

      } catch (e1) {
        setLocalMode("firebase init error");
      }

      // Service worker (opcional)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(function(){});
      }
    })();

    // ========= Local storage helpers =========
    function lsKey(collection){ return "luconi_"+collection+"_main"; }
    function lsRead(collection, defVal){
      try{
        var raw = localStorage.getItem(lsKey(collection));
        if(!raw) return defVal;
        var obj = JSON.parse(raw);
        return (obj && obj.items) ? obj.items : defVal;
      }catch(e){
        return defVal;
      }
    }
    function lsWrite(collection, items){
      try{
        localStorage.setItem(lsKey(collection), JSON.stringify({ items: items }));
      }catch(e){}
    }

    // ========= Firestore/local hook =========
    function useStore(collection, defVal) {
      var [data, setData] = useState(defVal);
      var [loaded, setLoaded] = useState(false);

      useEffect(function(){
        var mode = window.__APP_MODE__;
        var db = window.__DB__;

        // LOCAL MODE
        if(mode !== "firestore" || !db){
          var initial = lsRead(collection, defVal);

          // Si no había nada y el default es no-vacío, sembramos local
          if(initial === defVal && Array.isArray(defVal) && defVal.length > 0){
            lsWrite(collection, defVal);
            initial = defVal;
          }

          setData(initial);
          setLoaded(true);
          return;
        }

        // FIRESTORE MODE
        var unsub = db.collection(collection).doc("main").onSnapshot(function(doc){
          if(doc.exists){
            setData((doc.data() && doc.data().items) ? doc.data().items : defVal);
          }else{
            db.collection(collection).doc("main").set({ items: defVal }, { merge: true })
              .catch(function(e){
                console.warn("seed fail -> fallback local", collection, e);
                window.__APP_MODE__ = "local";
                var initial = lsRead(collection, defVal);
                setData(initial);
              });
            setData(defVal);
          }
          setLoaded(true);
        }, function(err){
          console.warn("firestore snapshot err -> fallback local", collection, err);
          window.__APP_MODE__ = "local";
          var initial = lsRead(collection, defVal);
          setData(initial);
          setLoaded(true);
        });

        return function(){ try{unsub && unsub();}catch(e){} };
      }, [collection]);

      var save = useCallback(function(fn){
        setData(function(prev){
          var next = (typeof fn === "function") ? fn(prev) : fn;

          var mode = window.__APP_MODE__;
          var db = window.__DB__;

          if(mode === "firestore" && db){
            db.collection(collection).doc("main").set({ items: next }, { merge: true })
              .catch(function(e){
                console.warn("save fail -> fallback local", collection, e);
                window.__APP_MODE__ = "local";
                lsWrite(collection, next);
              });
          } else {
            lsWrite(collection, next);
          }
          return next;
        });
      }, [collection]);

      return [data, save, loaded];
    }

    // ========= Components =========
    function SignaturePad(props){
      var canvasRef=useRef(null),drawing=useRef(false),lastPos=useRef({x:0,y:0});

      useEffect(function(){
        var c=canvasRef.current;
        if(!c) return;
        var ctx=c.getContext("2d"),r=c.getBoundingClientRect();
        c.width=r.width*2;c.height=r.height*2;
        ctx.scale(2,2);
        ctx.lineCap="round";
        ctx.lineJoin="round";
        ctx.lineWidth=2.5;
        ctx.strokeStyle="#1a1a2e";
      },[]);

      function gp(ev){
        var r=canvasRef.current.getBoundingClientRect(),t=ev.touches?ev.touches[0]:ev;
        return{x:t.clientX-r.left,y:t.clientY-r.top};
      }

      return(
        <div style={{background:"#fff",borderRadius:16,padding:20,boxShadow:"0 20px 60px rgba(0,0,0,.18)"}}>
          <p style={{margin:"0 0 10px",fontSize:14,color:"#666",textAlign:"center"}}>✍️ Firmá en el recuadro</p>
          <canvas ref={canvasRef} style={{width:"100%",height:150,border:"2px dashed #ccc",borderRadius:10,cursor:"crosshair",touchAction:"none",background:"#fafafa"}}
            onMouseDown={function(e){e.preventDefault();drawing.current=true;lastPos.current=gp(e);}}
            onMouseMove={function(e){if(!drawing.current)return;e.preventDefault();var ctx=canvasRef.current.getContext("2d"),p=gp(e);ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();lastPos.current=p;}}
            onMouseUp={function(){drawing.current=false;}} onMouseLeave={function(){drawing.current=false;}}
            onTouchStart={function(e){e.preventDefault();drawing.current=true;lastPos.current=gp(e);}}
            onTouchMove={function(e){if(!drawing.current)return;e.preventDefault();var ctx=canvasRef.current.getContext("2d"),p=gp(e);ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();lastPos.current=p;}}
            onTouchEnd={function(){drawing.current=false;}} />
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button onClick={function(){var c=canvasRef.current;c.getContext("2d").clearRect(0,0,c.width,c.height);}} style={BS("#e0e0e0","#333")}>Limpiar</button>
            <button onClick={props.onCancel} style={BS("#e74c3c","#fff")}>Cancelar</button>
            <button onClick={function(){props.onSave(canvasRef.current.toDataURL("image/png"));}} style={{...BS("#0052cc","#fff"),flex:1}}>Confirmar</button>
          </div>
        </div>
      );
    }

    function genTicketText(tx,company,caja){
      var l=["🛒 *LUCONI - Comprobante*","","📅 "+fmtD(tx.date),"👤 "+tx.employeeName,"🪪 DNI: "+tx.employeeDni,"🏢 "+(company||"—")];

    }

      function addBulkBonos(){

        var lines=bulkBonoText.trim().split("\n").filter(Boolean),nE=[],nB=[],eA=0,bA=0;

        for(var i=0;i<lines.length;i++){
          var parts=lines[i].split(/[,;\t]+/).map(function(s){return s.trim();});
          if(parts.length<3)continue;
          var nombre=parts[0],dni=parts[1],amt=parseFloat(parts[2]),lbl=parts[3]||bulkBonoLabel||"Bono";
          if(!nombre||!dni||!amt||amt<=0)continue;

          var cd=dni.replace(/\D/g,"");
          var emp=employees.find(function(e){return e.companyId===bulkBonoCo&&e.dni.replace(/\D/g,"")===cd;});
          var eid;

          if(emp){eid=emp.id;}
          else{
            var fn=nE.find(function(e){return e.dni.replace(/\D/g,"")===cd;});
            if(fn){eid=fn.id;}
            else{eid=gid();nE.push({id:eid,name:nombre,dni:dni,companyId:bulkBonoCo});eA++;}
          }

          nB.push({id:gid(),employeeId:eid,companyId:bulkBonoCo,amount:amt,remainingBalance:amt,label:lbl,date:new Date().toISOString()});
          bA++;
        }

        if(bA===0){show("Sin datos válidos","error");return;}
        if(nE.length>0)setEmployees(function(p){return[...p,...nE];});
        setBonos(function(p){return[...p,...nB];});
        setBulkBonoText("");
        show(bA+" bonos"+(eA>0?" + "+eA+" nuevos":"")+" ✓");
      }

      function importCSV(evt){
        var file=evt.target.files[0];
        if(!file||!importCo){show("Seleccioná empresa","error");return;}
        var reader=new FileReader();
        reader.onload=function(ev){
          var lines=String(ev.target.result||"").split("\n").map(function(l){return l.trim();}).filter(Boolean);
          if(lines.length<2){show("Vacío","error");return;}

          var nE=[],nB=[],eA=0,bA=0;

          for(var i=1;i<lines.length;i++){
            var c=lines[i].split(/[;,]/).map(function(s){return s.trim();});
            if(c.length<2||!c[0]||!c[1])continue;

            var nm=c[0],dn=c[1];
            var cd = dn.replace(/\D/g,"");

            var ex=employees.some(function(e){return e.dni.replace(/\D/g,"")===cd;})||nE.some(function(e){return e.dni.replace(/\D/g,"")===cd;});
            var eid;

            if(!ex){eid=gid();nE.push({id:eid,name:nm,dni:dn,companyId:importCo});eA++;}
            else{
              var f=employees.find(function(e){return e.dni.replace(/\D/g,"")===cd;});
              eid=f?f.id:nE.find(function(e){return e.dni.replace(/\D/g,"")===cd;}).id;
            }

            if(eid){
              var b1a=parseFloat(c[3])||0,b2a=parseFloat(c[5])||0;
              if(b1a>0){nB.push({id:gid(),employeeId:eid,companyId:importCo,amount:b1a,remainingBalance:b1a,label:c[2]||"Bono 1",date:new Date().toISOString()});bA++;}
              if(b2a>0){nB.push({id:gid(),employeeId:eid,companyId:importCo,amount:b2a,remainingBalance:b2a,label:c[4]||"Bono 2",date:new Date().toISOString()});bA++;}
            }
          }

          if(nE.length>0)setEmployees(function(p){return[...p,...nE];});
          if(nB.length>0)setBonos(function(p){return[...p,...nB];});

          show(eA+" empleados + "+bA+" bonos ✓");
          if(fileRef.current)fileRef.current.value="";
        };
        reader.readAsText(file);
      }

      function registerPurchase(sig){
        var eb = getEB(found.id);

        var ub = [];
        if(eb.length > 0){
          ub = selectedBonos.length > 0
            ? eb.filter(function(b){ return selectedBonos.includes(b.id); })
            : eb;
        }

        var bu = [];
        var total = 0;

        if(ub.length > 0){
          var upd = bonos.slice();
          for(var i=0;i<ub.length;i++){
            var x = ub[i];
            var idx = upd.findIndex(function(b){ return b.id === x.id; });
            if(idx === -1) continue;

            var dd = Number(upd[idx].remainingBalance) || 0;
            if(dd <= 0) continue;

            upd[idx] = Object.assign({}, upd[idx], { remainingBalance: 0 });
            bu.push({ bonoId: x.id, amount: dd, label: x.label });
            total += dd;
          }
          setBonos(upd);
        }

        var tx={
          id:gid(),
          employeeId:found.id,
          employeeName:found.name,
          employeeDni:found.dni,
          companyId:found.companyId,
          amount: total,
          date:new Date().toISOString(),
          signature:sig,
          bonosUsed:bu,
          caja:selectedCaja,
          registeredBy:currentUser?currentUser.name:"?"
        };

        setTransactions(function(p){return[...p,tx];});
        setLastTicket({
          tx:tx,
          company:(companies.find(function(c){return c.id===found.companyId;})||{}).name||"?",
          caja:selectedCaja
        });

        show("Registrada ✓");
        setFound(null);
        setSearchDni("");
        setShowSig(false);
        setSelectedBonos([]);
      }

        return Object.keys(r).map(function(n){
